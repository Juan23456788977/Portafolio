            // --- Handlers de Jornadas (Logs) ---
            modalLogHours() {
                Swal.fire({
                    title: '<i class="fa-solid fa-calendar-plus mr-2"></i> Registro de Jornada',
                    html: `
                        <input id="swal-date" type="date" class="swal2-input" max="${new Date().toISOString().split('T')[0]}" required>
                        <div class="flex gap-2">
                            <input id="swal-start" type="time" class="swal2-input" placeholder="Hora Inicio" required>
                            <input id="swal-end" type="time" class="swal2-input" placeholder="Hora Fin" required>
                        </div>
                        <textarea id="swal-activity" class="swal2-input" placeholder="Actividades realizadas hoy (Máx 250 carac.)" rows="3" maxlength="250" required></textarea>
                    `,
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonText: 'Guardar Bitácora',
                    confirmButtonColor: '#f97316',
                    preConfirm: () => {
                        const date = document.getElementById('swal-date').value;
                        const start = document.getElementById('swal-start').value;
                        const end = document.getElementById('swal-end').value;
                        const activity = document.getElementById('swal-activity').value;

                        if (!date || !start || !end || !activity) return Swal.showValidationMessage('Todos los campos son obligatorios.');

                        const startMoment = moment(`${date} ${start}`);
                        const endMoment = moment(`${date} ${end}`);
                        const duration = moment.duration(endMoment.diff(startMoment));
                        const hours = duration.asHours();

                        if (hours <= 0 || hours > 10) return Swal.showValidationMessage('El tiempo de la jornada no es válido (máx 10h).');
                        
                        return { date, start, end, activity, hours: hours.toFixed(2) };
                    }
                }).then((result) => {
                    if (result.isConfirmed) {
                        const logData = { 
                            user_id: this.currentUser.id, 
                            status: 'pending', 
                            ...result.value 
                        };
                        DataLayer.insert('logs', logData);
                        this.showNotification('Bitácora enviada a tu supervisor para aprobación.', 'success');
                        this.renderDashboard();
                    }
                });
            },
            handleLogValidation(logId, status) {
                const log = DataLayer.find('logs', logId);
                if (!log) return this.showNotification('Bitácora no encontrada.', 'error');
                
                Swal.fire({
                    title: `¿${status === 'approved' ? 'Aprobar' : 'Rechazar'} Bitácora?`,
                    text: `La jornada de ${log.hours}h de ${DataLayer.find('users', log.user_id).name} será marcada como ${status}.`,
                    icon: status === 'approved' ? 'success' : 'error',
                    showCancelButton: true,
                    confirmButtonColor: status === 'approved' ? '#10b981' : '#f87171',
                    cancelButtonColor: '#6b7280',
                    confirmButtonText: status === 'approved' ? 'Sí, Aprobar' : 'Sí, Rechazar',
                    cancelButtonText: 'Cancelar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        const success = DataLayer.update('logs', logId, { status: status, validation_date: new Date().toISOString() });
                        
                        if (success && status === 'approved') {
                            const pasante = DataLayer.find('users', log.user_id);
                            const newHours = (parseFloat(pasante.approved_hours) || 0) + parseFloat(log.hours);
                            DataLayer.update('users', log.user_id, { approved_hours: newHours.toFixed(2) });
                        }
                        
                        this.showNotification(`Bitácora ${status === 'approved' ? 'Aprobada' : 'Rechazada'} con éxito.`, status === 'approved' ? 'success' : 'warning');
                        this.renderDashboard();
                    }
                });
            },

                Swal.fire({
                    title: '¿Eliminar Mención?',

            },
            
            loadChatRecipientList() {
                const currentUserId = this.currentUser.id;
                
                // CORRECCIÓN: Permitir al administrador chatear con CUALQUIER otro usuario
                let recipients = DataLayer.query('users', u => 
                    u.id !== currentUserId && (
                        (this.currentUser.role === 'pasante' && (u.role === 'supervisor' || u.role === 'admin')) ||
                        (this.currentUser.role === 'supervisor' && (u.role === 'pasante' || u.role === 'supervisor' || u.role === 'admin')) ||
                        (this.currentUser.role === 'admin') // Lógica simplificada: Si es admin, puede chatear con cualquiera que no sea él mismo.
                    )
                );
                // FIN DE CORRECCIÓN

                // Prioritize users the current user has chatted with recently
                const chats = DataLayer.query('chats');
                const recentChatPartners = chats
                    .filter(c => c.sender_id === currentUserId || c.receiver_id === currentUserId)
                    .map(c => c.sender_id === currentUserId ? c.receiver_id : c.sender_id)
                    .filter((id, index, self) => self.indexOf(id) === index); // Unique IDs

                // Sort recipients: Recent chat partners first, then by role (supervisor, pasante, admin), then alphabetically
                recipients.sort((a, b) => {
                    const aRecent = recentChatPartners.includes(a.id);
                    const bRecent = recentChatPartners.includes(b.id);

                    if (aRecent && !bRecent) return -1;
                    if (!aRecent && bRecent) return 1;

                    // Secondary sort: Role priority
                    const roleOrder = { admin: 3, supervisor: 2, pasante: 1 };
                    if (roleOrder[b.role] !== roleOrder[a.role]) return roleOrder[b.role] - roleOrder[a.role];

                    // Tertiary sort: Alphabetical
                    return a.name.localeCompare(b.name);
                });

                return recipients;
            },
            
            renderChatRecipientList(recipients) {

                }).then(res => {

                        try{
                            // Primero descargar backup si la función está disponible
                            const doReset = () => {
                                if (window.resetDatabaseSafe) return resetDatabaseSafe();
                                if (window.resetDatabase) return resetDatabase({reseed:true});
                                const key = (window.DataLayer && DataLayer.KEY) || 'itat_pasantias_v_prod_final';

                                localStorage.removeItem(key);
                                location.reload();
                            };

                            if (window.downloadDatabaseBackup) {
                                window.downloadDatabaseBackup().then(() => doReset()).catch(err => {
                                    console.warn('No se pudo descargar backup automáticamente, procediendo a reinicio:', err);
                                    doReset();
                                });
                            } else {
                                doReset();
                            }
                        }catch(e){
                            console.error(e);
                            alert('No se pudo reiniciar: ' + (e && e.message));
                        }
                    }
                });
            });

            // Aplicar animaciones simples a contenedores cuando cargue la app
            document.addEventListener('DOMContentLoaded', ()=>{
                const container = document.getElementById('app');
                if (container){
                    container.classList.add('animated');
                    setTimeout(()=> container.classList.add('in'), 80);
                }
                // animar filas de tablas si existen
                const rows = document.querySelectorAll('.table-responsive tbody tr');
                rows.forEach((r,i)=> setTimeout(()=> r.classList.add('visible','table-row'), 120 + i*40));
            });

            // Atajo de teclado: Ctrl+Shift+R -> Reinicio seguro de BD (solo admins)
            window.addEventListener('keydown', (e) => {
                try {
                    const isTrigger = (e.ctrlKey || e.metaKey) && e.shiftKey && (e.key && e.key.toLowerCase() === 'r');
                    if (!isTrigger) return;
                    // Evitar interferir en inputs
                    const active = document.activeElement;
                    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) return;

                    // Solo permitir a administradores
                    const isAdmin = window.App && App.currentUser && App.currentUser.role === 'admin';
                    if (!isAdmin) {
                        Swal.fire('Acceso denegado', 'El atajo de reinicio solo está disponible para administradores.', 'error');
                        return;
                    }

                    e.preventDefault();
                    Swal.fire({
                        title: 'Atajo de Reinicio Detectado',
                        text: '¿Deseas reiniciar la base de datos ahora? Se guardará un backup en localStorage y la app recargará.',
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonText: 'Sí, reiniciar',
                        cancelButtonText: 'Cancelar'
                    }).then(res => {
                        if (res.isConfirmed) {
                                try{
                                    const doReset = () => {
                                        if (window.resetDatabaseSafe) return resetDatabaseSafe();
                                        if (window.resetDatabase) return resetDatabase({reseed:true});
                                        const key = (window.DataLayer && DataLayer.KEY) || 'itat_pasantias_v_prod_final';
                                        const raw = localStorage.getItem(key);
                                        localStorage.setItem(key + '_backup_' + new Date().toISOString().replace(/[:.]/g,'-'), raw || '');
                                        localStorage.removeItem(key);
                                        location.reload();
                                    };

                                    if (window.downloadDatabaseBackup) {
                                        window.downloadDatabaseBackup().then(() => doReset()).catch(err => {
                                            console.warn('No se pudo descargar backup automáticamente, procediendo a reinicio:', err);
                                            doReset();
                                        });
                                    } else {
                                        doReset();
                                    }
                                } catch (err) {
                                    console.error('Error reiniciando DB via atajo', err);
                                    Swal.fire('Error', 'No se pudo reiniciar la base de datos: ' + (err && err.message), 'error');
                                }
                            }
                    });
                } catch (err) { console.error('Error en atajo teclado', err); }
            });
        })();
    </script>
