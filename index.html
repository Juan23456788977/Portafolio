    <style>
        /* Estilos Globales */
        body { background-color: #f3f4f6; }
        /* Evitar scrollbar horizontal de página y mejorar box-sizing */
        html, body { overflow-x: hidden; }
        *, *::before, *::after { box-sizing: border-box; }
        
        /* Efecto 3D en Tarjetas */
        .card-3d {
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }
        .card-3d:hover {
            transform: perspective(1000px) rotateX(1deg) rotateY(1deg) scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(79, 70, 229, 0.1);
        }

        /* Contenedor Login 3D */
        .login-container-3d {
            transform-style: preserve-3d;
            perspective: 1500px;
        }
        .login-graphic-3d {
            background: linear-gradient(140deg, #4f46e5, #312e81);
            transform: rotateY(-10deg) rotateX(5deg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .login-container-3d:hover .login-graphic-3d {
            transform: rotateY(-12deg) rotateX(3deg) scale(1.02);
        }

        /* Chat Scrollbar */
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .chat-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .chat-container { scroll-behavior: smooth; }
        
        /* Home Page Profesional 3D */
        .hero-background {
            background: linear-gradient(-45deg, #1e1b4b, #312e81, #0f172a, #3730a3);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .hero-card:hover {
            transform: perspective(1500px) rotateY(5deg) rotateX(2deg) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        /* Swap de Features */
        .feature-grid.active {
            display: grid;
            animation: fade-in-fast 0.5s ease-out 0.3s forwards;
        }
        .feature-grid.inactive {
            animation: fade-out-fast 0.3s ease-in forwards;
        }
        
        /* FAQ */
        .faq-item {
            background-color: #213245; /* base-800 - CORREGIDO */
            border: 1px solid #334155; /* base-700 */
            border-radius: 1.5rem; /* rounded-3xl */
            overflow: hidden;
        }
        .faq-item summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }
        .faq-item summary::-webkit-details-marker { display: none; }
        .faq-item summary:after {
            content: '\f078'; /* FontAwesome chevron-down */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            transition: transform 0.3s ease;
        }
        .faq-item[open] summary:after { transform: rotate(180deg); }
        .faq-item .faq-content {
            padding: 0 1.5rem 1.5rem 1.5rem;
            color: #cbd5e1; /* primary-200 - CORREGIDO */
            border-top: 1px solid #334155; /* base-700 */
        }

        /* Estilos para SweetAlert (usados en modales) */
        .swal2-input, .swal2-select {
            width: 100% !important;
            border-radius: 0.75rem !important; /* rounded-xl */
            border: 1px solid #94a3b8 !important; /* border-primary-300 */
            font-size: 1rem !important;
            padding: 0.75rem 1rem !important;
        }
        .swal2-input:focus, .swal2-select:focus {
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.3) !important; /* focus:ring-primary-200 */
            border-color: #4f46e5 !important; /* focus:border-primary-500 */
        }
        
        /* Estilos para subida de avatar */
        .avatar-upload-container {
            position: relative;
            cursor: pointer;
        }
        .avatar-upload-overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 50%;
        }
        .avatar-upload-container:hover .avatar-upload-overlay {
            opacity: 1;
        }
        #avatar-upload-input {
            display: none;
        }
        /* Mejoras para modales y responsividad */
        #edit-user-modal { z-index: 20000; }
        .swal2-container { z-index: 30000 !important; }
        .swal2-popup { width: 100% !important; max-width: 640px !important; }
        @media (max-width: 768px) {
            .sidebar { position: static !important; width: 100% !important; }
            .login-graphic-3d { display: none !important; }
        }
        /* Evitar que el sidebar se solape con el contenido en pantallas grandes */
        .sidebar { z-index: 10; }
        .main-content { z-index: 0; }
        .icon-btn { display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:8px; border:1px solid rgba(0,0,0,0.06); background:#fff; cursor:pointer; }

        .cupo-controls { display:flex; gap:6px; align-items:center; justify-content:center; }
        @media (max-width: 1024px) {
            .icon-btn { width:30px; height:30px; }
        }
        /* Animaciones y transiciones suaves */
        .fade-up { animation: fadeUp 360ms cubic-bezier(.2,.9,.3,1) both; }
        @keyframes fadeUp {
            from { transform: translateY(8px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .row-hover:hover { background-color: rgba(79,70,229,0.03); transform: translateY(-4px); transition: transform 220ms ease, background-color 220ms ease; }
        .btn-primary-soft { background: linear-gradient(180deg, rgba(79,70,229,0.12), rgba(79,70,229,0.06)); color: #312e81; border-radius: 10px; padding: .5rem .75rem; }

        /* Mejoras responsivas globales */
        img, svg { max-width: 100%; height: auto; display: block; }
        table { width: 100%; border-collapse: collapse; }
        .responsive-table { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .responsive-table table { width: 100%; table-layout: fixed; }
        .responsive-table th, .responsive-table td { word-break: break-word; white-space: normal; }
        .swal2-popup { width: 95% !important; max-width: 640px !important; }
        /* Forzar que inputs se adapten en móviles */
        .swal2-input, .swal2-select { font-size: 1rem !important; }
        /* Modal de edición adaptativo */
        #edit-user-modal > div { width: calc(100% - 2rem); max-width: 920px; margin: 0 1rem; }
        @media (max-width: 1024px) {
            .hero-card { padding: 1rem; }

        @media (max-width: 768px) {
            /* Ajustes para móviles */
            .swal2-popup { max-width: 95% !important; }
            .sidebar { position: static !important; width: 100% !important; }
            .main-content { padding: 1rem !important; }
            .icon-btn { width: 30px !important; height: 30px !important; }
            .row-hover { transform: none !important; }
            .table-responsive td, .table-responsive th { white-space: normal !important; }
            /* Forzar que ningún elemento cause overflow horizontal en móviles */
            nav, header, footer, .card-3d, .hero-card, .main-content { max-width: 100%; overflow-x: hidden; }
            /* Hacer tablas desplazables internamente sin crear scrollbar de página */
            .responsive-table { -ms-overflow-style: -ms-autohiding-scrollbar; }
        }
    </style>
</head>

                    </div>
                </div>
                
                <input type="hidden" id="edit-user-id">
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-dark mb-2">Nombre Completo</label>
                        <input type="text" id="edit-user-name" class="swal2-input" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-dark mb-2">Email</label>

                                <input id="edit-user-targethours" type="number" min="1" class="swal2-input">
                            </div>
                    </div>
                </div>
                
                <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8">
                    <button type="button" onclick="App.closeEditModal()" class="w-full sm:w-auto bg-gray-200 hover:bg-gray-300 text-dark font-bold py-2 px-6 rounded-lg transition">Salir sin guardar</button>

                </div>
            </form>
        </div>

            get() { 
                const raw = localStorage.getItem(this.KEY);
                if (!raw) {
                    // Si no existe la DB en localStorage, sembrar datos por defecto inmediatamente
                    const seedData = this.seed();
                    localStorage.setItem(this.KEY, JSON.stringify(seedData));
                    return seedData;
                }
                try {
                    const db = JSON.parse(raw);
                    // Asegurar estructura mínima (compatibilidad con DB antiguas)
                    const seedData = this.seed();
                    let changed = false;
                    if (!db.menciones) { db.menciones = seedData.menciones || []; changed = true; }
                    if (!db.companies) { db.companies = seedData.companies || []; changed = true; }
                    if (!db.users) { db.users = seedData.users || []; changed = true; }
                    if (!db.logs) { db.logs = seedData.logs || []; changed = true; }
                    if (!db.chats) { db.chats = seedData.chats || []; changed = true; }
                    if (changed) this.save(db);
                    return db;
                } catch (err) {
                    console.error('Error parsing localStorage DB, re-seeding.', err);
                    const seedData = this.seed();
                    localStorage.setItem(this.KEY, JSON.stringify(seedData));
                    return seedData;
                }
            },
            save(data) { localStorage.setItem(this.KEY, JSON.stringify(data)); },
            init() {
                if (!localStorage.getItem(this.KEY)) {
                    const seedData = this.seed();
                    const logs = seedData.logs.filter(l => l.status === 'approved');
                    seedData.users.forEach(u => {
                        if (u.role === 'pasante') {
                            const userLogs = logs.filter(l => l.user_id === u.id);
                            const totalHours = userLogs.reduce((sum, log) => sum + parseFloat(log.hours), 0);
                            u.approved_hours = totalHours;
                        }
                    });
                    localStorage.setItem(this.KEY, JSON.stringify(seedData));
                }
            },
            query(table, filterFn = null) {
                const db = this.get();
                if (!db || !db[table]) return [];
                return filterFn ? db[table].filter(filterFn) : db[table];
            },
            find(table, id) {
                const db = this.get();
                return db[table].find(item => item.id == id);
            },
            insert(table, item) {
                const db = this.get();
                item.id = this.generateUniqueId();
                item.created_at = new Date().toISOString();
                db[table].push(item);
                this.save(db);
                return item;
            },
            update(table, id, updates) {
                const db = this.get();
                const index = db[table].findIndex(i => i.id == id);
                if (index !== -1) {
                    db[table][index] = { ...db[table][index], ...updates };
                    this.save(db);
                    return true;
                }
                return false;
            }
        };

                const user = users.find(u => u.email === email && u.pass === password);
                if (user) {
                    DataLayer.update('users', user.id, { lastLogin: new Date().toISOString() });
                }
                return user || null;
            },
            
            requestPasswordReset(email) {
                const user = DataLayer.query('users', u => u.email.toLowerCase() === email.toLowerCase())[0];
                if (user) {
                    return { success: true, user: user };
                } else {
                    return { success: false };

            },

            handleImageUpload(file, userId) {
                return new Promise((resolve, reject) => {
                    if (!file) return reject('No se seleccionó ningún archivo.');
                    if (!file.type.startsWith('image/')) return reject('El archivo debe ser una imagen.');
                    if (file.size > 2 * 1024 * 1024) return reject('La imagen no puede pesar más de 2MB.');

                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => {
                        const dataUrl = reader.result;
                        const success = DataLayer.update('users', userId, { avatar_url: dataUrl });
                        if (success) {
                            resolve(dataUrl);
                        } else {
                            reject('Error al guardar la imagen en la base de datos.');
                        }
                    };
                    reader.onerror = (error) => reject('Error al leer el archivo.');
                });
            },

            // --- Algoritmo de Asignación Automática ---
            runAutomaticAssignment() {
                const unassignedStudents = DataLayer.query('users', u => u.role === 'pasante' && !u.company);
                let availableCompanies = DataLayer.query('companies', c => c.cupo_disponible > 0);
                
                // 1. Ordenar estudiantes por promedio (descendente)
                const sortedStudents = unassignedStudents.sort((a, b) => parseFloat(b.average) - parseFloat(a.average));
                
                const assignmentsLog = [];
                const unassignedLog = [];
                
                const getPrestigeScore = (importance) => {
                    if (importance === 'alta') return 3;
                    if (importance === 'media') return 2;
                    return 1;
                };

                // 2. Iterar por cada estudiante (del mejor al peor)
                for (const student of sortedStudents) {
                    // 3. Encontrar empresas que lo acepten (por mención y cupo)
                    const qualifiedCompanies = availableCompanies.filter(c => 
                        c.cupo_disponible > 0 && 
                        c.menciones_requeridas.includes(student.mencion)
                    );
                    
                    if (qualifiedCompanies.length === 0) {
                        unassignedLog.push(student);
                        continue;
                    }
                    
                    // 4. Ordenar empresas calificadas por prestigio (descendente)
                    qualifiedCompanies.sort((a, b) => getPrestigeScore(b.importance) - getPrestigeScore(a.importance));
                    const bestCompany = qualifiedCompanies[0];
                    
                    // 5. Realizar la asignación
                    
                    // Asignar supervisor de esa empresa (balanceo por assigned_count)
                    const supervisor = this.assignCompanySupervisor(bestCompany.name);
                    // Asignar tutor académico (lógica de balanceo de carga)
                    const tutor = this.assignTutor();

                    DataLayer.update('users', student.id, {
                        company: bestCompany.name,
                        supervisor_id: supervisor ? supervisor.id : null,
                        tutor_id: tutor ? tutor.id : null
                    });

                    // Actualizar el cupo de la empresa (se hace en la variable local primero para la iteración)
                    const companyIndex = availableCompanies.findIndex(c => c.id === bestCompany.id);
                    if (companyIndex !== -1) {
                        availableCompanies[companyIndex].cupo_disponible -= 1;
                        DataLayer.update('companies', bestCompany.id, { cupo_disponible: availableCompanies[companyIndex].cupo_disponible });
                    }

                    assignmentsLog.push({ student: student.name, company: bestCompany.name, tutor: tutor ? tutor.name : 'N/A', supervisor: supervisor ? supervisor.name : 'N/A' });
                }
                
                // 6. Recargar la lista de tutores y supervisores de la DB para reflejar los cambios en assigned_count
                LogicLayer.tutorsCache = DataLayer.query('users', u => u.role === 'supervisor' && u.is_tutor);
                LogicLayer.supervisorsCache = DataLayer.query('users', u => u.role === 'supervisor' && !u.is_tutor);

                return { assignmentsMade: assignmentsLog, unassignedStudents: unassignedLog.map(s => s.name) };
            },

            // --- Lógica de Tutoría ---
            // Selecciona dinámicamente un tutor académico (is_tutor === true) con la menor carga (assigned_count)
            assignTutor() {
                const tutors = DataLayer.query('users', u => u.role === 'supervisor' && u.is_tutor);
                if (!tutors || tutors.length === 0) return null;

                // Ordenar por assigned_count ascendente
                tutors.sort((a, b) => (a.assigned_count || 0) - (b.assigned_count || 0));
                const selected = tutors[0];

                // Actualizar contador en la base de datos
                DataLayer.update('users', selected.id, { assigned_count: (selected.assigned_count || 0) + 1 });

                // Devolver la versión actualizada
                return DataLayer.find('users', selected.id);
            },

            // Selecciona un supervisor empresarial de la empresa dada balanceando por assigned_count
            assignCompanySupervisor(companyName) {
                const supervisors = DataLayer.query('users', u => u.role === 'supervisor' && !u.is_tutor && u.company === companyName);
                if (!supervisors || supervisors.length === 0) return null;

                supervisors.sort((a, b) => (a.assigned_count || 0) - (b.assigned_count || 0));
                const selected = supervisors[0];

                // Incrementar contador para el supervisor empresarial también
                DataLayer.update('users', selected.id, { assigned_count: (selected.assigned_count || 0) + 1 });

                return DataLayer.find('users', selected.id);
            },

            // --- Lógica de búsqueda y filtrado ---
            searchUsers(users, filters) {
                let filtered = users.filter(user => {
                    const searchTerm = filters.term.toLowerCase();
                    const nameMatch = user.name.toLowerCase().includes(searchTerm);
                    const emailMatch = user.email.toLowerCase().includes(searchTerm);
                    
                    const roleMatch = filters.role === 'all' || user.role === filters.role;
                    
                    const mentionMatch = filters.mencion === 'all' || user.mencion === filters.mencion;

                    // Filtrado por promedio (solo aplica a pasantes)
                    const average = parseFloat(user.average);
                    const min = parseFloat(filters.notaMin || 0);
                    const max = parseFloat(filters.notaMax || 20);
                    
                    const notaMatch = (user.role !== 'pasante') || (average >= min && average <= max);
                    
                    return (nameMatch || emailMatch) && roleMatch && mentionMatch && notaMatch;
                });

                // Ordenar: Nombre por defecto
                filtered.sort((a, b) => a.name.localeCompare(b.name));

                return filtered;
            }
            ,
            calculateAverage(arr) {
                if (!Array.isArray(arr) || arr.length === 0) return 0;
                let sum = 0, count = 0;
                arr.forEach(u => {
                    const v = parseFloat(u.average);
                    if (!isNaN(v)) { sum += v; count++; }
                });
                return count === 0 ? 0 : (sum / count);
            },
            exportToCSV(data) {
                if (!Array.isArray(data) || data.length === 0) return '';
                const keys = Object.keys(data[0]);
                const escape = (v) => '"' + String(v === null || v === undefined ? '' : v).replace(/"/g, '""') + '"';
                const header = keys.join(',');
                const rows = data.map(row => keys.map(k => escape(row[k])).join(','));
                return [header].concat(rows).join('\n');
            },
            exportToPDF(data, title = 'Reporte') {
                    // Devuelve una Promise que intentará incluir el logo si está disponible
                    return new Promise(async (resolve, reject) => {
                        try {
                            const headers = Object.keys(data[0]);
                            const rows = data.map(r => headers.map(h => r[h]));

                            // Intentar cargar logo local `assets/logo.png` o `assets/logo.svg` como dataURL
                            let logoDataUrl = null;
                            try {
                                let resp = await fetch('assets/logo.png');
                                if (resp.ok) {
                                    const blob = await resp.blob();
                                    logoDataUrl = await new Promise((res, rej) => {
                                        const reader = new FileReader();
                                        reader.onload = () => res(reader.result);
                                        reader.onerror = rej;
                                        reader.readAsDataURL(blob);
                                    });
                                } else {
                                    // Intentar SVG
                                    resp = await fetch('assets/logo.svg');
                                    if (resp.ok) {
                                        const svgText = await resp.text();
                                        // Crear data URL SVG
                                        const svgDataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgText);
                                        // Convertir SVG a PNG usando canvas para que jsPDF acepte el formato
                                        logoDataUrl = await new Promise((res, rej) => {
                                            const img = new Image();
                                            img.onload = () => {
                                                try {
                                                    const canvas = document.createElement('canvas');
                                                    canvas.width = img.width || 200;
                                                    canvas.height = img.height || 200;
                                                    const ctx = canvas.getContext('2d');
                                                    ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
                                                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                                    res(canvas.toDataURL('image/png'));
                                                } catch (err) { rej(err); }
                                            };
                                            img.onerror = (e) => rej(e);
                                            img.src = svgDataUrl;
                                        });
                                    }
                                }
                            } catch (e) {
                                // No hacer nada si no existe
                                logoDataUrl = null;
                            }

                            const doc = new jspdf.jsPDF();
                            doc.setFontSize(12);

                            // Si hay logo, añadir arriba a la izquierda
                            if (logoDataUrl) {
                                try {
                                    // Centrar la imagen en la página
                                    const pageWidth = (doc.internal.pageSize && doc.internal.pageSize.getWidth) ? doc.internal.pageSize.getWidth() : doc.internal.pageSize.width;
                                    const imgW = 50; // ancho en unidades jsPDF
                                    const imgH = 50; // altura estimada
                                    const imgX = (pageWidth - imgW) / 2;
                                    doc.addImage(logoDataUrl, 'PNG', imgX, 10, imgW, imgH);
                                    // texto centrado bajo la imagen
                                    doc.text(title, pageWidth / 2, 10 + imgH + 12, { align: 'center' });
                                } catch (e) {
                                    const pageWidth = (doc.internal.pageSize && doc.internal.pageSize.getWidth) ? doc.internal.pageSize.getWidth() : doc.internal.pageSize.width;
                                    doc.text(title, pageWidth / 2, 20, { align: 'center' });
                                }
                            } else {
                                const pageWidth = (doc.internal.pageSize && doc.internal.pageSize.getWidth) ? doc.internal.pageSize.getWidth() : doc.internal.pageSize.width;
                                doc.text(title, pageWidth / 2, 20, { align: 'center' });
                            }

                            // Ajustar margen superior si logo presente
                            const startY = logoDataUrl ? 10 + 50 + 20 : 28;

                            doc.autoTable({
                                head: [headers],
                                body: rows,
                                startY: startY,
                                styles: { fontSize: 9 }
                            });
                            doc.save(`${title}.pdf`);
                            resolve(true);
                        } catch (err) {
                            console.error('Error exportando PDF', err);
                            alert('No se pudo generar el PDF. Revisa la consola para más detalles.');
                            reject(err);
                        }
                    });
            }
        };

            toggleFeatures() {
                this.showingMoreFeatures = !this.showingMoreFeatures;
                const set1 = document.getElementById('features-set-1');
                const set2 = document.getElementById('features-set-2');
                const btn = document.getElementById('toggle-features-btn');
                const chevron = document.getElementById('features-chevron');

                if (this.showingMoreFeatures) {
                    set1.classList.remove('active');
                    set1.classList.add('inactive');
                    chevron.classList.add('rotate-180');
                    setTimeout(() => {
                        set1.style.display = 'none';
                        set2.style.display = 'grid';
                        set2.classList.remove('inactive');
                        set2.classList.add('active');
                        btn.innerHTML = `Ver menos características <i class="fa-solid fa-chevron-up ml-1" id="features-chevron"></i>`;
                    }, 300); // Espera a que termine el fade-out
                } else {
                    set2.classList.remove('active');
                    set2.classList.add('inactive');
                    chevron.classList.remove('rotate-180');
                    setTimeout(() => {
                        set2.style.display = 'none';
                        set1.style.display = 'grid';
                        set1.classList.remove('inactive');
                        set1.classList.add('active');
                        btn.innerHTML = `Ver todas las características <i class="fa-solid fa-chevron-down ml-1" id="features-chevron"></i>`;
                    }, 300); // Espera a que termine el fade-out
                }
            },

            // --- VISTA SUPERVISOR EMPRESARIAL ---
            viewSupervisorEmpresarial(user) {
                const interns = DataLayer.query('users', u => u.role === 'pasante' && u.supervisor_id === user.id);
                const pendingLogs = DataLayer.query('logs', l => {
                    const intern = interns.find(i => i.id === l.user_id);
                    return intern && l.status === 'pending';
                });
                
                const totalHoursValidated = interns.reduce((sum, i) => sum + (parseFloat(i.approved_hours) || 0), 0).toFixed(2);
                
                let avgInternProgress = 0;
                if (interns.length > 0) {
                    const totalProgress = interns.reduce((sum, i) => {
                        const progress = (parseFloat(i.approved_hours) || 0) / (i.target_hours || 420);
                        return sum + progress;
                    }, 0);
                    avgInternProgress = (totalProgress / interns.length) * 100;
                }

                return `
                    <h2 class="text-3xl font-extrabold text-primary-800 mb-6">DASHBOARD EMPRESARIAL <span class="text-base text-gray-500 font-medium">| ${user.company}</span></h2>

                        ${this.renderAdminMetric('Horas Certificadas', `${totalHoursValidated}h`, 'fa-shield-halved', 'green')}

                            </div>
                            <div class="divide-y divide-primary-50">
                                ${pendingLogs.length ? pendingLogs.map(log => {
                                    const intern = interns.find(i => i.id === log.user_id);
                                    return `
                                        <div class="flex justify-between items-center p-4 hover:bg-primary-50 transition">
                                            <div>
                                                <p class="font-bold text-dark">${intern.name} (${log.hours}h)</p>
                                                <p class="text-xs text-gray-600">${moment(log.date).format('DD/MM/YYYY')} - ${log.activity.substring(0, 50)}...</p>
                                            </div>
                                            <div class="flex gap-2">
                                                <button onclick="App.handleLogValidation(${log.id}, 'approved')" title="Aprobar" class="bg-green-500 hover:bg-green-600 text-white p-2 rounded-full w-10 h-10 transition">
                                                    <i class="fa-solid fa-check"></i>
                                                </button>
                                                <button onclick="App.handleLogValidation(${log.id}, 'rejected')" title="Rechazar" class="bg-red-500 hover:bg-red-600 text-white p-2 rounded-full w-10 h-10 transition">
                                                    <i class="fa-solid fa-times"></i>
                                                </button>
                                            </div>
                                        </div>
                                    `;
                                }).join('') : '<div class="p-6 text-center text-gray-500"><i class="fa-solid fa-check-circle mr-2"></i> No hay bitácoras pendientes de validación.</div>'}
                            </div>
                        </div>
                        
                        <div class="lg:col-span-1 bg-white rounded-2xl shadow-xl p-6 border border-primary-100">
                            <h3 class="font-extrabold text-xl text-primary-800 mb-4 border-b pb-3"><i class="fa-solid fa-chart-bar mr-2"></i> Rendimiento de Pasantes</h3>

                        </div>

                                ` : `
                                    <div class="bg-green-50 p-4 rounded-xl border-l-4 border-green-500 flex items-center gap-4">
                                        <i class="fa-solid fa-check-circle text-green-600 text-2xl"></i>

            viewTutorPasantes(user) {

                    content = this.viewAdminTutorAssignment(user);

                return `
                    <div class="grid lg:grid-cols-4 gap-6">

                        ${this.renderAdminMetric('Horas Certificadas', `${totalHours.toFixed(0)}h`, 'fa-clock', 'primary')}
                        ${this.renderAdminMetric('Cupos Disponibles', companies.reduce((sum, c) => sum + c.cupo_disponible, 0), 'fa-chair', 'accent')}

                    <div class="grid lg:grid-cols-2 gap-6">

                            <div class="h-64">
                                <canvas id="roleDistributionChart"></canvas>
                            </div>

                            <div class="h-64">
                                <canvas id="monthlyHoursChart"></canvas>

                    </div>
                `;
            },
            viewAdminUsers(user) {
                const allUsers = DataLayer.query('users');
                const pasantes = allUsers.filter(u => u.role === 'pasante');

                            <i class="fa-solid fa-file-csv"></i> CSV

            viewAdminCompanies(user) {

            // --- VISTA ADMIN: MENCIONES ---

            // --- UI Comunes ---

                    red: { bg: 'bg-red-50', text: 'text-red-600', shadow: 'shadow-red-200' }
                };
                const c = colors[color] || colors.primary;
                
                return `
                    <div class="bg-white rounded-xl p-5 border border-primary-100 shadow-md ${isUrgent ? 'ring-2 ring-accent-500' : ''} card-3d">

                        <div class="space-y-4">

                                <div class="bg-white p-4 rounded-xl shadow-md">
                                    <div class="flex items-center justify-between">
                                        <div>
                                            <div class="font-bold text-lg">${u.name}</div>
                                            <div class="text-sm text-gray-500">ID: ${u.id} · ${u.role}</div>
                                        </div>
                                        <div class="text-right">
                                            <div class="text-sm text-gray-600">Promedio <span class="font-bold">${parseFloat(u.average).toFixed(2)}</span></div>

                                    <div class="mt-3 flex items-center justify-between">
                                        <div class="text-sm text-gray-600">Mención: ${u.mencion || 'N/A'}</div>

                                <th class="px-6 py-4">Nombre</th>
                                <th class="px-6 py-4">Rol</th>
                                <th class="px-6 py-4">Mención</th>
                                <th class="px-6 py-4">Promedio</th>

                        <tbody class="divide-y divide-gray-100">

                                    <td class="px-6 py-4 space-x-3 whitespace-nowrap">
                                        <button onclick="App.modalEditUser(${u.id})" class="text-blue-600 hover:text-blue-800 transition" title="Editar"><i class="fa-solid fa-edit"></i></button>
                                        <button onclick="App.handleDeleteUser(${u.id})" class="text-red-600 hover:text-red-800 transition" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

            renderPasanteTable(pasantes, contextId = 'tutor') {

                if (view === 'mobile') {
                    return `
                        <div class="space-y-4">
                            ${pasantes.map(u => {
                                const percentage = ((parseFloat(u.approved_hours) || 0) / (u.target_hours || 420)) * 100;
                                const tutor = u.tutor_id ? DataLayer.find('users', u.tutor_id) : { name: 'N/A' };
                                return `
                                    <div class="bg-white p-4 rounded-xl shadow-md">
                                        <div class="flex items-start justify-between">
                                            <div>
                                                <div class="font-bold text-lg">${u.name}</div>
                                                <div class="text-sm text-gray-500">Mención: ${u.mencion || 'N/A'}</div>

                                            <div class="text-right">

                                        </div>
                                        <div class="mt-3 flex items-center justify-end gap-3">
                                            <button onclick="App.viewMessages(${u.id})" class="text-blue-600 hover:text-blue-800 transition" title="Chatear"><i class="fa-solid fa-comment"></i></button>
                                            <button onclick="App.modalEditUser(${u.id})" class="text-green-600 hover:text-green-800 transition" title="Ver/Editar"><i class="fa-solid fa-eye"></i></button>

                }

                return `
                    <table class="w-full text-sm text-left">
                        <thead class="text-xs text-gray-700 uppercase bg-primary-50/50">
                            <tr>
                                <th class="px-6 py-4">ID</th>
                                <th class="px-6 py-4">Nombre</th>
                                <th class="px-6 py-4">Mención</th>
                                <th class="px-6 py-4">Promedio</th>
                                <th class="px-6 py-4">Empresa</th>
                                <th class="px-6 py-4">Tutor</th>
                                <th class="px-6 py-4">Progreso</th>
                                <th class="px-6 py-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            ${pasantes.map(u => {
                                const percentage = ((parseFloat(u.approved_hours) || 0) / (u.target_hours || 420)) * 100;
                                const tutor = u.tutor_id ? DataLayer.find('users', u.tutor_id) : { name: 'N/A' };
                                return `
                                    <tr class="hover:bg-primary-50 transition duration-150">
                                        <td class="px-6 py-4 font-medium text-gray-700">${u.id}</td>
                                        <td class="px-6 py-4 font-semibold text-dark">${u.name}</td>
                                        <td class="px-6 py-4 text-gray-600">${u.mencion || 'N/A'}</td>
                                        <td class="px-6 py-4 text-gray-600 font-bold">${parseFloat(u.average).toFixed(2)}</td>
                                        <td class="px-6 py-4 text-gray-600">${u.company || 'Sin Asignar'}</td>
                                        <td class="px-6 py-4 text-gray-600">${tutor.name}</td>
                                        <td class="px-6 py-4">
                                            <div class="w-20 bg-gray-200 rounded-full h-2.5">
                                                <div class="h-2.5 rounded-full ${percentage >= 100 ? 'bg-green-600' : percentage > 50 ? 'bg-blue-600' : 'bg-red-600'}" style="width: ${Math.min(100, percentage).toFixed(0)}%"></div>
                                            </div>
                                            <span class="text-xs text-gray-500">${percentage.toFixed(1)}%</span>
                                        </td>
                                        <td class="px-6 py-4 space-x-3 whitespace-nowrap">
                                            <button onclick="App.viewMessages(${u.id})" class="text-blue-600 hover:text-blue-800 transition" title="Chatear"><i class="fa-solid fa-comment"></i></button>
                                            <button onclick="App.modalEditUser(${u.id})" class="text-green-600 hover:text-green-800 transition" title="Ver/Editar"><i class="fa-solid fa-eye"></i></button>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                `;
            },
            renderContactCard(user) {
                return `
                    <div class="flex items-center gap-4">
                        ${this.renderAvatar(user, 'w-16 h-16 text-xl')}
                        <div class="flex-1">
                            <p class="font-bold text-dark text-lg">${user.name}</p>
                            <p class="text-sm text-gray-600">${user.email}</p>
                            <button onclick="App.viewMessages(${user.id})" class="mt-2 text-primary-600 hover:text-primary-800 transition text-sm font-semibold">
                                <i class="fa-solid fa-comment-dots mr-1"></i> Chatear Ahora
                            </button>
                        </div>
                    </div>
                    <div class="border-t border-primary-100 pt-3 mt-3 space-y-2">
                        <p class="text-sm text-gray-700 flex items-center gap-2"><i class="fa-solid fa-briefcase text-primary-500 w-4"></i> ${user.company || 'ITAT'}</p>
                        ${user.phone ? `<p class="text-sm text-gray-700 flex items-center gap-2"><i class="fa-solid fa-phone text-primary-500 w-4"></i> ${user.phone}</p>` : ''}
                    </div>
                `;
            },
            renderAvatar(user, classes) {
                if (user.avatar_url) {
                    return `<img src="${user.avatar_url}" alt="${user.name}" class="${classes} rounded-full object-cover">`;
                }
                const initials = (user.name || 'NN').split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                return `
                    <div class="${classes} rounded-full flex items-center justify-center bg-primary-600 text-white font-extrabold shadow-md shadow-primary-500/30">
                        ${initials}
                    </div>
                `;
            },
            renderSearchFilters(contextId) {
                const mentions = DataLayer.query('menciones').map(m => m.name);
                return `
                    <div class="bg-gray-100 p-6 rounded-xl shadow-inner mb-6">
                        <h4 class="font-bold text-dark mb-4"><i class="fa-solid fa-filter mr-2"></i> Filtros de Búsqueda</h4>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <input type="text" id="search-term-${contextId}" onkeyup="App.handleFilterUsers('${contextId}')" placeholder="Buscar por Nombre o Email" class="px-4 py-2 border rounded-lg focus:ring-primary-500 focus:border-primary-500 text-sm md:col-span-2">
                            
                            <select id="filter-role-${contextId}" onchange="App.handleFilterUsers('${contextId}')" class="px-4 py-2 border rounded-lg focus:ring-primary-500 focus:border-primary-500 text-sm">
                                <option value="all">Todos los Roles</option>
                                <option value="pasante">Pasante</option>
                                <option value="supervisor">Supervisor</option>
                                ${contextId === 'admin' ? '<option value="admin">Administrador</option>' : ''}
                            </select>
                            
                            <select id="filter-mencion-${contextId}" onchange="App.handleFilterUsers('${contextId}')" class="px-4 py-2 border rounded-lg focus:ring-primary-500 focus:border-primary-500 text-sm">
                                <option value="all">Todas las Menciones</option>
                                ${mentions.map(m => `<option value="${m}">${m}</option>`).join('')}
                            </select>
                            
                            <input type="number" step="0.01" min="0" max="20" id="filter-nota-min-${contextId}" onchange="App.handleFilterUsers('${contextId}')" placeholder="Nota Min." class="px-4 py-2 border rounded-lg focus:ring-primary-500 focus:border-primary-500 text-sm">
                            <input type="number" step="0.01" min="0" max="20" id="filter-nota-max-${contextId}" onchange="App.handleFilterUsers('${contextId}')" placeholder="Nota Max." class="px-4 py-2 border rounded-lg focus:ring-primary-500 focus:border-primary-500 text-sm">
                            
                            <button onclick="App.handleClearFilters('${contextId}')" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 rounded-lg transition text-sm">
                                Limpiar Filtros
                            </button>
                            <div class="flex items-center gap-2">
                                <span class="text-sm text-gray-600 mr-2">Vista:</span>
                                <button id="listview-desktop-${contextId}" onclick="App.setListView('${contextId}','desktop')" class="px-3 py-1 rounded-lg bg-primary-600 text-white text-sm">PC</button>
                                <button id="listview-mobile-${contextId}" onclick="App.setListView('${contextId}','mobile')" class="px-3 py-1 rounded-lg bg-gray-200 text-sm">Móvil</button>
                            </div>
                        </div>
                    </div>
                `;
            },

            // --- Handlers de Lógica de la APP ---
            handleLogin() {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                
                const user = LogicLayer.login(email, password);
                
                if (user) {
                    this.currentUser = user;
                    sessionStorage.setItem('itat_session_prod', JSON.stringify(user));
                    this.showNotification(`¡Bienvenido, ${user.name}!`, 'success');
                    this.renderDashboard();
                } else {
                    this.showNotification('Credenciales incorrectas.', 'error');
                }
            },
            setListView(contextId, view) {
                if (!this.listViewSettings) this.listViewSettings = {};
                this.listViewSettings[contextId] = view;
                // Actualizar botones visualmente
                const desktopBtn = document.getElementById(`listview-desktop-${contextId}`);
                const mobileBtn = document.getElementById(`listview-mobile-${contextId}`);
                if (desktopBtn && mobileBtn) {
                    if (view === 'desktop') {
                        desktopBtn.classList.add('bg-primary-600'); desktopBtn.classList.remove('bg-gray-200'); desktopBtn.classList.add('text-white');
                        mobileBtn.classList.remove('bg-primary-600'); mobileBtn.classList.add('bg-gray-200'); mobileBtn.classList.remove('text-white');
                    } else {
                        mobileBtn.classList.add('bg-primary-600'); mobileBtn.classList.remove('bg-gray-200'); mobileBtn.classList.add('text-white');
                        desktopBtn.classList.remove('bg-primary-600'); desktopBtn.classList.add('bg-gray-200'); desktopBtn.classList.remove('text-white');
                    }
                }
                // Forzar recarga de la tabla correspondiente
                try { this.handleFilterUsers(contextId); } catch (e) { /* ignore */ }
            },
            handleLogout() {
                Swal.fire({
                    title: '¿Cerrar Sesión?',
                    text: "¿Estás seguro de que quieres salir del sistema?",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#4f46e5',
                    cancelButtonColor: '#d33',
                    confirmButtonText: 'Sí, Cerrar',
                    cancelButtonText: 'Cancelar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        sessionStorage.removeItem('itat_session_prod');
                        this.currentUser = null;
                        this.showNotification('Sesión finalizada. ¡Vuelve pronto!', 'info');
                        this.renderHomePage();
                    }
                });
            },
            viewProfile() {
                if (!this.currentUser) return this.renderLogin();
                // Abrir modal de edición con los datos del usuario actual
                this.modalEditUser(this.currentUser.id);
            },
            handlePasswordReset() {
                const email = document.getElementById('reset-email').value;
                const result = LogicLayer.requestPasswordReset(email);
                
                if (result.success) {
                    Swal.fire('Instrucciones Enviadas', `Se han enviado instrucciones para restablecer tu contraseña a <strong>${email}</strong>.`, 'success');
                } else {
                    Swal.fire('Error', 'El correo no se encuentra registrado en el sistema.', 'error');
                }
            },
            
            // --- Handlers de Admin ---
            setAdminSection(section) {
                this.adminSection = section;
                this.renderDashboard();
            },
            toggleAdminSidebar() {
                const sidebar = document.getElementById('admin-sidebar');
                if (!sidebar) return;
                sidebar.classList.toggle('hidden');
            },
            loadAdminTutorSection(force = false) {
                // Método utilitario para recargar la vista de administración/tutor después de cambios en datos.
                // Si se pasa `force`, forzamos una recarga completa.
                try {
                    this.renderDashboard();
                } catch (err) {
                    console.error('Error recargando la sección admin/tutor:', err);
                }
            },
            
            // Lógica para registrar/editar usuario (Modal)
            modalRegisterUser() {
                const htmlContent = `
                    <input id="swal-name" type="text" class="swal2-input" placeholder="Nombre Completo" required>
                    <input id="swal-email" type="email" class="swal2-input" placeholder="Correo Electrónico" required>
                    <input id="swal-pass" type="password" class="swal2-input" placeholder="Contraseña (Mín. 6 caracteres)" required>
                    <label class="block text-sm font-semibold text-dark mb-2 mt-4 text-left">Fecha de Nacimiento</label>
                    <input id="swal-birthdate" type="date" class="swal2-input" required>
                    <select id="swal-role" class="swal2-select" onchange="App.togglePasanteFields(this.value)" required>
                        <option value="">Seleccionar Rol...</option>
                        <option value="pasante">Pasante</option>
                        <option value="supervisor">Supervisor</option>
                        <option value="admin">Administrador</option>
                    </select>

                    <div id="pasante-fields" style="display: none; padding-top: 10px; border-top: 1px solid #e0e7ff; margin-top: 10px; text-align: left;">
                        <label class="block text-sm font-semibold text-dark mb-2 mt-2">Cédula</label>
                        <input id="swal-cedula" type="text" class="swal2-input" placeholder="V-00000000">
                        <label class="block text-sm font-semibold text-dark mb-2 mt-2">Mención</label>
                        <select id="swal-mencion" class="swal2-select"></select>
                        <p id="swal-mencion-note" class="text-xs text-gray-500 mt-1" style="display:none;">No hay menciones registradas. Se asignará <strong>N/A</strong> si no se selecciona ninguna.</p>
                        <label class="block text-sm font-semibold text-dark mb-2 mt-2">Horas Requeridas</label>
                        <input id="swal-targetHours" type="number" min="1" class="swal2-input" placeholder="420" value="420">
                        <label class="block text-sm font-semibold text-dark mb-2 mt-2">Promedio (Nota)</label>
                        <input id="swal-average" type="number" step="0.01" min="0" max="20" class="swal2-input" placeholder="18.50">
                    </div>

                    <div id="supervisor-fields" style="display: none; padding-top: 10px; border-top: 1px solid #e0e7ff; margin-top: 10px; text-align: left;">
                        <label class="block text-sm font-semibold text-dark mb-2 mt-2">Es Tutor Académico ITAT?</label>
                        <select id="swal-isTutor" class="swal2-select">
                            <option value="false">No (Supervisor Empresarial)</option>
                            <option value="true">Sí (Tutor Académico)</option>
                        </select>
                        <label class="block text-sm font-semibold text-dark mb-2 mt-2">Empresa/Departamento</label>
                        <select id="swal-company" class="swal2-select"><option value="">Seleccionar Empresa...</option></select>
                        <input id="swal-company-other" type="text" class="swal2-input" placeholder="Nombre de la empresa (otra)" style="display:none; margin-top:6px;">
                        <p id="swal-company-note" class="text-xs text-gray-500 mt-1" style="display:none;">No hay empresas registradas. Selecciona 'ITAT' o elige 'Otra...' para escribir una empresa.</p>
                        <label class="block text-sm font-semibold text-dark mb-2 mt-2">Teléfono</label>
                        <input id="swal-phone" type="tel" class="swal2-input" placeholder="0414-0000000">
                    </div>
                `;
                
                Swal.fire({
                    title: 'Registrar Nuevo Usuario',
                    html: htmlContent,
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonText: 'Registrar',
                    cancelButtonText: 'Cancelar',
                    confirmButtonColor: '#4f46e5',
                    preConfirm: () => {
                        return App.handleRegisterUser();
                    }
                });
                
                // Exponer la función para que el onchange en el select funcione dentro del modal
                window.App.togglePasanteFields = (role) => {
                    document.getElementById('pasante-fields').style.display = role === 'pasante' ? 'block' : 'none';
                    document.getElementById('supervisor-fields').style.display = role === 'supervisor' ? 'block' : 'none';
                };
                
                // Pre-rellenar campos del admin
                document.getElementById('swal-email').value = ''; 
                document.getElementById('swal-pass').value = ''; 
                // Poblar lista de menciones y empresas dinámicamente
                try {
                    const swalMencion = document.getElementById('swal-mencion');
                    const swalMencionNote = document.getElementById('swal-mencion-note');
                    if (swalMencion) {
                        const menciones = DataLayer.query('menciones') || [];
                        if (menciones.length === 0) {
                            swalMencion.innerHTML = '<option value="">N/A</option>';
                            if (swalMencionNote) swalMencionNote.style.display = 'block';
                        } else {
                            swalMencion.innerHTML = '<option value="">Seleccionar Mención...</option>' + menciones.map(m => `<option value="${m.name}">${m.name} (${m.required_hours}h)</option>`).join('');

                    const swalCompanyNote = document.getElementById('swal-company-note');
                    if (swalCompany) {
                        const companies = DataLayer.query('companies') || [];
                        if (companies.length === 0) {
                            // Si no hay empresas, ofrecer 'ITAT' como valor por defecto y opción 'Otra'
                            swalCompany.innerHTML = '<option value="ITAT">ITAT</option><option value="__other__">Otra...</option>';
                            if (swalCompanyNote) swalCompanyNote.style.display = 'block';
                        } else {
                            swalCompany.innerHTML = '<option value="">Seleccionar Empresa...</option>' + companies.map(c => `<option value="${c.name}">${c.name}</option>`).join('') + '<option value="__other__">Otra...</option>';
                            if (swalCompanyNote) swalCompanyNote.style.display = 'none';
                        }

                        // Mostrar campo libre si se selecciona 'Otra...'
                        const otherInput = document.getElementById('swal-company-other');
                        swalCompany.addEventListener('change', () => {
                            if (swalCompany.value === '__other__') {
                                otherInput.style.display = 'block';
                                otherInput.focus();
                            } else {
                                otherInput.style.display = 'none';
                            }
                        });
                    }

                    // Depuración: mostrar en consola el estado actual de menciones y empresas
                    try {
                        console.info('DEBUG: menciones en DB:', DataLayer.query('menciones'));
                        console.info('DEBUG: empresas en DB:', DataLayer.query('companies'));
                        console.info('DEBUG: usuarios en DB (count):', DataLayer.query('users').length);
                    } catch (e) {
                        console.warn('DEBUG: no se pudo leer DataLayer para depuración', e);
                    }
                } catch (e) { console.warn('No se pudo poblar menciones/empresas en modal registro', e); }
            },
            handleRegisterUser() {
                const [name, email, pass, role] = ['swal-name', 'swal-email', 'swal-pass', 'swal-role'].map(id => document.getElementById(id).value.trim());

                if (!name || !email || !pass || !role) return Swal.showValidationMessage('Todos los campos principales son obligatorios.');
                if (pass.length < 6) return Swal.showValidationMessage('La contraseña debe tener al menos 6 caracteres.');
                if (DataLayer.query('users', u => u.email === email).length > 0) return Swal.showValidationMessage('Ya existe un usuario con este correo.');
                
                let user_data = { name, email, pass, role, avatar: name[0].toUpperCase(), avatar_url: null };
                
                const birthdate = document.getElementById('swal-birthdate')?.value;
                // Fecha de nacimiento opcional: si está vacía, se guarda como null
                user_data.birthdate = birthdate || null;

                if (role === 'pasante') {
                    const [cedula, mencionEl, target_hours_input, average_input] = ['swal-cedula', 'swal-mencion', 'swal-targetHours', 'swal-average'].map(id => document.getElementById(id).value.trim());
                    const target_hours = parseInt(target_hours_input);
                    const average = parseFloat(average_input);

                    // Si no hay menciones registradas, permitimos crear el pasante y asignar 'N/A'
                    const mencionesList = DataLayer.query('menciones') || [];
                    let mencion = mencionEl;
                    if (mencionesList.length === 0) {
                        mencion = 'N/A';
                    } else {
                        if (!mencion) return Swal.showValidationMessage('Debe seleccionar una mención.');
                    }

                    if (!cedula || isNaN(target_hours) || isNaN(average)) return Swal.showValidationMessage('Faltan datos obligatorios del Pasante.');
                    
                    user_data = { ...user_data, cedula, mencion, target_hours, average: average.toFixed(2), approved_hours: 0, supervisor_id: null, tutor_id: null, company: null };
                } else if (role === 'supervisor') {
                    const is_tutor = document.getElementById('swal-isTutor').value === 'true';
                    let company = document.getElementById('swal-company').value.trim();
                    const phone = document.getElementById('swal-phone').value.trim();
                    // Si el usuario eligió 'Otra...', leer el campo libre
                    if (company === '__other__') {
                        const other = document.getElementById('swal-company-other')?.value.trim();
                        if (!other) return Swal.showValidationMessage('Ingrese el nombre de la empresa en el campo "Otra".');
                        company = other;
                    }
                    if (!company) return Swal.showValidationMessage('Debe seleccionar la empresa o indicar "ITAT".');

                    user_data = { ...user_data, company, phone, is_tutor: is_tutor, assigned_count: 0 };
                }
                
                // Depuración: log antes de insertar
                try { console.info('DEBUG: Creando usuario:', user_data); } catch(e){}
                DataLayer.insert('users', user_data);
                try { console.info('DEBUG: Usuarios ahora (count):', DataLayer.query('users').length); } catch(e){}
                this.showNotification('¡Usuario Registrado!', 'success');
                this.loadAdminTutorSection(); 
                return true; 
            },
            
            modalEditUser(userId) {
                const user = DataLayer.find('users', userId);
                if (!user) return this.showNotification('Usuario no encontrado.', 'error');

                const modal = document.getElementById('edit-user-modal');
                document.getElementById('edit-user-id').value = user.id;
                document.getElementById('edit-user-name').value = user.name;
                document.getElementById('edit-user-email').value = user.email;
                document.getElementById('edit-user-role').value = user.role;
                
                // Campos de Pasante
                const pasanteFields = document.getElementById('edit-pasante-fields');
                pasanteFields.style.display = user.role === 'pasante' ? 'block' : 'none';

                // Ajustes de campo según el rol y según quién edita
                const editingSelf = this.currentUser && (this.currentUser.id === user.id);
                const isAdminEditor = this.currentUser && this.currentUser.role === 'admin';

                // Email: editable si el editor es el propio usuario o un admin
                const emailInput = document.getElementById('edit-user-email');
                emailInput.value = user.email || '';
                emailInput.disabled = !(editingSelf || isAdminEditor);

                // Password: sólo editable por el propio usuario o admin (campo vacío conserva la contraseña)
                const passInput = document.getElementById('edit-user-pass');
                passInput.value = '';
                passInput.disabled = !(editingSelf || isAdminEditor);

                // Nombre: no editable por pasantes/tutores moderadores cuando editan su propio perfil
                const nameInput = document.getElementById('edit-user-name');
                nameInput.value = user.name || '';
                if (editingSelf && !isAdminEditor && (user.role === 'pasante' || user.role === 'supervisor')) {
                    nameInput.disabled = true;
                } else {
                    nameInput.disabled = false;
                }

                // Rol: sólo editable por admin
                const roleSelect = document.getElementById('edit-user-role');
                roleSelect.value = user.role;
                roleSelect.disabled = !isAdminEditor;

                // Previsualizar avatar del usuario que se va a editar (no la última subida global)
                try {
                    const preview = document.getElementById('edit-avatar-preview');
                    const fileInput = document.getElementById('edit-avatar-input');
                    if (fileInput) fileInput.value = ''; // limpiar selección previa
                    if (preview) {
                        if (user.avatar_url) {
                            preview.innerHTML = `<img src="${user.avatar_url}" alt="avatar" class="w-20 h-20 rounded-full object-cover">`;
                        } else {
                            const initial = (user.avatar && user.avatar.length) ? user.avatar : (user.name ? user.name[0].toUpperCase() : 'U');
                            preview.innerHTML = `<div class="w-full h-full flex items-center justify-center text-white font-extrabold text-xl">${initial}</div>`;
                        }
                    }
                } catch (e) { console.warn('No se pudo inicializar la previsualización del avatar', e); }

                if (user.role === 'pasante') {
                    // Poblar select de menciones dinámicamente

                    try {
                        const mentionSelect = document.getElementById('edit-user-mencion');
                        const menciones = DataLayer.query('menciones');
                        mentionSelect.innerHTML = '<option value="">Seleccionar Mención...</option>' + menciones.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
                        mentionSelect.value = user.mencion || '';
                        // Sólo el administrador puede modificar la mención
                        mentionSelect.disabled = !isAdminEditor;
                    } catch (e) { console.warn('No se pudieron poblar menciones en modal edit', e); }

                    document.getElementById('edit-user-average').value = parseFloat(user.average).toFixed(2);
                    // Deshabilitar edición del promedio a menos que el editor sea admin
                    const avgInput = document.getElementById('edit-user-average');
                    if (isAdminEditor) {
                        avgInput.disabled = false;
                        avgInput.title = '';
                    } else {
                        avgInput.disabled = true;
                        avgInput.title = 'El promedio solo puede ser modificado por un administrador.';
                    }
                    
                    // Llenar el select de empresas (asumiendo que las empresas existen)
                    const companySelect = document.getElementById('edit-user-company');
                    const companies = DataLayer.query('companies');
                    companySelect.innerHTML = `<option value="">Sin Asignar</option>`;
                    companySelect.innerHTML += companies.map(c => 
                        `<option value="${c.name}">${c.name}</option>`
                    ).join('');
                    companySelect.value = user.company || ''; 
                    // Sólo el administrador puede reasignar empresa
                    companySelect.disabled = !isAdminEditor;
                }

                modal.style.display = 'flex';
                window.App.toggleEditPasanteFields = () => { // Expuesto para el onchange
                    const role = document.getElementById('edit-user-role').value;
                    document.getElementById('edit-pasante-fields').style.display = role === 'pasante' ? 'block' : 'none';
                };
            },
            closeEditModal() {
                document.getElementById('edit-user-modal').style.display = 'none';
            },
            handleUpdateUser() {
                const userId = document.getElementById('edit-user-id').value;
                const name = document.getElementById('edit-user-name').value;
                const role = document.getElementById('edit-user-role').value;

                // Determinar permisos del editor
                const editingSelf = this.currentUser && (String(this.currentUser.id) === String(userId));
                const isAdminEditor = this.currentUser && this.currentUser.role === 'admin';

                const updates = {};

                // Si quien edita es el propio usuario y NO es admin (pasante/tutor/moderador),
                // sólo permitir cambiar email y contraseña (y avatar mediante la subida de archivo separada).
                if (editingSelf && !isAdminEditor && (this.currentUser.role === 'pasante' || this.currentUser.role === 'supervisor')) {
                    const email = document.getElementById('edit-user-email').value.trim();
                    const pass = document.getElementById('edit-user-pass').value;
                    if (!email) return Swal.fire('Error de Validación', 'El correo es obligatorio.', 'error');
                    updates.email = email;
                    if (pass && pass.length >= 6) updates.pass = pass;

                } else {
                    // Editor es admin o está editando otro usuario: permitir cambios completos según rol
                    updates.name = name;
                    updates.role = role;

                    if (role === 'pasante') {
                        // Obtener valores, usar valores existentes si el admin no los cambió
                        const mencionEl = document.getElementById('edit-user-mencion');
                        const company = document.getElementById('edit-user-company').value || null;
                        const averageEl = document.getElementById('edit-user-average');

                        // Fallback a datos existentes
                        const existingUser = DataLayer.find('users', userId) || {};
                        const mencionVal = mencionEl && mencionEl.value ? mencionEl.value : (existingUser.mencion || 'N/A');
                        const averageRaw = averageEl && String(averageEl.value).trim() !== '' ? parseFloat(averageEl.value) : parseFloat(existingUser.average);

                        if (!mencionVal || isNaN(averageRaw)) {
                            return Swal.fire('Error de Validación', 'Mención y Promedio son obligatorios para Pasantes.', 'error');
                        }

                        updates.mencion = mencionVal;
                        updates.company = company;

                        // Solo permitir que un administrador actualice el promedio; si no es admin, mantener el valor existente
                        if (isAdminEditor) {
                            updates.average = averageRaw.toFixed(2);
                        }
                    } else {
                        updates.mencion = 'N/A';
                        updates.company = 'ITAT'; // Asume ITAT para admin/supervisor no pasante
                    }

                    // Si el editor es admin y puso contraseña nueva, actualizarla
                    const pass = document.getElementById('edit-user-pass').value;
                    const email = document.getElementById('edit-user-email').value.trim();
                    if (email) updates.email = email;
                    if (pass && pass.length >= 6) updates.pass = pass;
                }

                const success = DataLayer.update('users', userId, updates);

                if (success) {
                    this.showNotification('Usuario Actualizado con éxito.', 'success');
                    this.closeEditModal();
                    if (this.currentUser && String(this.currentUser.id) === String(userId)) {
                        this.currentUser = DataLayer.find('users', userId);
                        sessionStorage.setItem('itat_session_prod', JSON.stringify(this.currentUser));
                    }
                    this.loadAdminTutorSection(); 
                } else {
                    this.showNotification('No se pudo actualizar el usuario.', 'error');
                }
            },
            
            // --- Handlers para Subida de Foto ---

                    const dataUrl = await LogicLayer.handleImageUpload(file, this.currentUser.id);

                } catch (error) {

            // Carga de avatar desde el modal de edición (permite cambiar la foto de cualquier usuario)
            async handleImageUploadModal(event) {
                const file = event.target.files[0];
                if (!file) return;
                const userId = document.getElementById('edit-user-id')?.value;
